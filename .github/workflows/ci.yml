name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Check Node Version
      run: |
        node -v
        npm -v
        which node
    - run: npm ci
    - run: npm run lint
    - run: npm run build
    - run: npm test
